<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC26 Predictor</title>

<style>
body{
margin:0;
background:#0d1117;
color:white;
font-family:Arial,sans-serif;
}
header{
padding:20px;
background:#161b22;
position:sticky;
top:0;
}
.balance{
font-size:28px;
font-weight:bold;
color:#00d26a;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.card{
background:#1c2330;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}
.match{
font-size:22px;
margin-bottom:15px;
}
.options{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}
button{
background:#293246;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}
button:hover{
background:#37435e;
}
input{
width:100%;
margin-top:12px;
padding:10px;
border-radius:8px;
border:none;
}
.result{
margin-top:10px;
font-weight:bold;
}
</style>

</head>
<body>

<header>
<div class="balance">
⚽ Points: <span id="points">1000</span>
</div>
</header>

<div class="container" id="matches"></div>

<script>

const matches = [
{
home:"Portugal",
away:"Uzbekistan",
homeWin:62,
draw:20,
awayWin:18
},
{
home:"England",
away:"Ghana",
homeWin:58,
draw:24,
awayWin:18
},
{
home:"Panama",
away:"Croatia",
homeWin:22,
draw:25,
awayWin:53
},
{
home:"Colombia",
away:"DR Congo",
homeWin:65,
draw:20,
awayWin:15
}
];

let points = Number(localStorage.getItem("wc26_points") || 1000);

function updatePoints(){
document.getElementById("points").textContent = points;
localStorage.setItem("wc26_points", points);
}

function predict(prob,index,name){

const stake =
Number(document.getElementById("stake-"+index).value);

if(stake <= 0){
alert("Enter a valid stake");
return;
}

if(stake > points){
alert("Not enough points");
return;
}

const multiplier = 100 / prob;

if(Math.random() < prob/100){

const gain = Math.round(stake * multiplier) - stake;

points += gain;

document.getElementById("result-"+index)
.innerHTML = "✅ " + name + " won +" + gain + " pts";

}else{

points -= stake;

document.getElementById("result-"+index)
.innerHTML = "❌ Lost " + stake + " pts";

}

updatePoints();

}

function render(){

const wrap = document.getElementById("matches");

matches.forEach((m,i)=>{

wrap.innerHTML += `
<div class="card">

<div class="match">
${m.home} vs ${m.away}
</div>

<div class="options">

<button onclick="predict(${m.homeWin},${i},'${m.home}')">
${m.home}<br>${m.homeWin}%
</button>

<button onclick="predict(${m.draw},${i},'Draw')">
Draw<br>${m.draw}%
</button>

<button onclick="predict(${m.awayWin},${i},'${m.away}')">
${m.away}<br>${m.awayWin}%
</button>

</div>

<input
id="stake-${i}"
type="number"
value="100"
min="1">

<div
class="result"
id="result-${i}">
</div>

</div>
`;

});

}

updatePoints();
render();

</script>

</body>
</html>
